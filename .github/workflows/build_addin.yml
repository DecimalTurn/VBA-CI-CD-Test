name: Handle Release

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  generate:
    name: Create release-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate the artifacts
        uses: Vba-actions/build-excel-addin@v1

      # NEW: create a *draft* release only for manual runs
      - name: Create draft release (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="draft-${GITHUB_RUN_ID}"
          TITLE="Draft build ${GITHUB_RUN_NUMBER}"
          gh release create "$TAG" \
            --draft \
            --title "$TITLE" \
            --notes "Draft release created by workflow run ${GITHUB_RUN_ID}."

      # Upload to release (works for both event types):
      # - release event: action discovers release id from event
      # - workflow_dispatch: action discovers release id by the tag we just created
      - name: Upload the artifacts
        uses: skx/github-action-publish-binaries@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: 'Addin.xlam'
